name: Load Config and Run App

on:
  push:
    branches:
      - main

jobs:
  run-app:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure AWS credentials using OIDC
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::135330967620:role/S3PasswordTest
          aws-region: us-east-1

      # 3. Install only required dependency
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # 4. Download config file from S3
      - name: Download config from S3
        run: |
          aws s3 cp s3://s3-config-pwd-test/config.json config.json
          echo "✅ Config downloaded from S3"

      # 🔥 REAL VALIDATION STEP (NEW)
      - name: Verify secret source (real validation)
        run: |
          set -e

          CONFIG=$(cat config.json)

          SECRET_ARN=$(echo $CONFIG | jq -r '.tenants.TEST.db.password')

          echo "🔍 Validating secret source..."

          # 1. Ensure config does NOT contain raw password
          if [[ "$SECRET_ARN" != arn:* ]]; then
            echo "❌ ERROR: Invalid secret reference in config.json"
            exit 1
          fi

          # 2. Validate secret exists in AWS Secrets Manager
          aws secretsmanager describe-secret \
            --secret-id "$SECRET_ARN" \
            --region us-east-1 > /dev/null

          echo "✅ Secret exists in AWS Secrets Manager"
          echo "📌 Verified: Password is NOT stored in config.json"
          echo "📌 Verified: Password is sourced ONLY from AWS Secrets Manager"

      # 5. Fetch secret from AWS Secrets Manager and run app
      - name: Fetch secret and run app
        run: |
          CONFIG=$(cat config.json)

          SECRET_ARN=$(echo $CONFIG | jq -r '.tenants.TEST.db.password')

          DB_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_ARN" \
            --query SecretString \
            --output text)

          export DB_PASSWORD

          echo "✅ CONFIRMED: Password fetched from AWS Secrets Manager only"

          node app.js

          echo "✅ SUCCESS: App executed with config + secret"